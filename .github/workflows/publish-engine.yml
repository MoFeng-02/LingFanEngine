# =============================================================================
# 引擎 + SDK 自动发布工作流
# -----------------------------------------------------------------------------
# 触发：推送 tag `vX.Y.Z` 时自动：
#   1. publish-engine     : 构建 4 个引擎库 → 打包 LingFanEngine.DLLs.zip + updates/latest.json
#   2. publish-sdk-windows: 在 windows-latest 上 AOT 发布 SDK.Desktop (win-x64, WinExe 无控制台)
#   3. publish-sdk-linux  : 在 ubuntu-latest 上 AOT 发布 SDK.Desktop (linux-x64, 需 clang)
#   4. publish-sdk-macos  : 在 macos-latest 上 AOT 发布 SDK.Desktop (osx-arm64)
#   5. release            : 汇总所有产物，创建 GitHub Release 并上传 asset
#
# 版本全部由 tag 自动校准（-p:Version），不再写死。
# Pidgin 为本地魔改分发（不随 NuGet），其版本从 DLL 真实元数据读取，独立于引擎 tag。
#
# 说明：
#   - SDK.Desktop 的 OutputType 按构建机 OS 条件化：Windows=WinExe（无控制台），
#     其他平台=Avalonia 不支持 WinExe 故退为 Exe（会带控制台窗口，功能正常）。
#   - 每个 SDK job 先 `dotnet build` 引擎库，确保 bin 目录存在 4 个 DLL，
#     SyncEngineDlls target 才能把它们复制进 SDK 安装包的 DLL/ 子目录（自愈种子）。
#   - 版本号统一在 `Compute version` 步骤（shell: bash）中从 tag 剥离 `v` 前缀，
#     通过 ${{ steps.version.outputs.VERSION }} 注入；不在 run 脚本里做 shell 展开，
#     避免 Windows runner 默认 PowerShell 无法解析 ${GITHUB_REF_NAME#v} 导致版本为空。
# =============================================================================
name: Publish Engine + SDK

on:
  push:
    tags:
      - 'v*'

jobs:
  publish-engine:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Compute version
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # 构建引擎核心库（传递依赖会一并产出 Abstractions / DslCore / Pidgin 到 bin 目录）
      # 版本号由 tag 注入（-p:Version），使 DLL 程序集版本与发布 tag 保持一致（不再写死 1.0.0）
      - name: Build engine core (Release)
        run: dotnet build src/EngineCore/LingFanEngine/LingFanEngine.csproj -c Release -f net10.0 -p:Version=${{ steps.version.outputs.VERSION }}

      - name: Collect DLLs + compute sha256 + generate manifest
        id: collect
        shell: bash
        run: |
          set -euo pipefail
          OUT="src/EngineCore/LingFanEngine/bin/Release/net10.0"
          DLLS=(LingFanEngine.dll LingFanEngine.Abstractions.dll LingFanEngine.DslCore.dll Pidgin.dll)
          VER="${{ steps.version.outputs.VERSION }}"
          mkdir -p publish
          declare -A SUMS
          for d in "${DLLS[@]}"; do
            cp "$OUT/$d" "publish/$d"
            SUMS[$d]=$(sha256sum "publish/$d" | cut -d' ' -f1)
          done
          TAG="${{ github.ref_name }}"
          # Pidgin 为本地魔改分发，读其 DLL 真实版本（取前三段 X.Y.Z）；读取失败时回落引擎版本
          PIDGIN_VER=$(pwsh -NoProfile -Command "try { [System.Reflection.AssemblyName]::GetAssemblyName((Resolve-Path '$OUT/Pidgin.dll')).Version.ToString(3) } catch { '${{ steps.version.outputs.VERSION }}' }")
          PIDGIN_VER="${PIDGIN_VER//[$'\r\n']/}"
          [ -z "$PIDGIN_VER" ] && PIDGIN_VER="$VER"
          cat > updates/latest.json <<EOF
          {
            "version": "$VER",
            "sdkVersion": "$VER",
            "releaseNotesUrl": "https://github.com/MoFeng-02/LingFanEngine/releases/tag/$TAG",
            "assetUrl": "https://github.com/MoFeng-02/LingFanEngine/releases/download/$TAG/LingFanEngine.DLLs.zip",
            "assetSha256": "",
            "breakingAbstractions": false,
            "breakingDlls": [],
            "publishedUtc": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "minSdkVersion": "$VER",
            "dllChecksums": {
              "LingFanEngine.dll": "${SUMS[LingFanEngine.dll]}",
              "LingFanEngine.Abstractions.dll": "${SUMS[LingFanEngine.Abstractions.dll]}",
              "LingFanEngine.DslCore.dll": "${SUMS[LingFanEngine.DslCore.dll]}",
              "Pidgin.dll": "${SUMS[Pidgin.dll]}"
            },
            "dllVersions": {
              "LingFanEngine.dll": "$VER",
              "LingFanEngine.Abstractions.dll": "$VER",
              "LingFanEngine.DslCore.dll": "$VER",
              "Pidgin.dll": "$PIDGIN_VER"
            }
          }
          EOF
          (cd publish && zip -r ../LingFanEngine.DLLs.zip .)

      - name: Upload engine package
        uses: actions/upload-artifact@v4
        with:
          name: engine-package
          path: |
            LingFanEngine.DLLs.zip
            updates/latest.json

  publish-sdk-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Compute version
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # 先构建引擎库，确保 bin/Release/net10.0 存在 4 个 DLL，供 SyncEngineDlls 复制进 SDK 安装包
      - name: Build engine libs (seed for SyncEngineDlls)
        run: dotnet build src/EngineCore/LingFanEngine/LingFanEngine.csproj -c Release -f net10.0 -p:Version=${{ steps.version.outputs.VERSION }}

      - name: AOT publish SDK.Desktop (win-x64)
        run: dotnet publish src/SDK_Toolkit/LingFanEngine.SDK.Desktop/LingFanEngine.SDK.Desktop.csproj -c Release -r win-x64 --self-contained true -p:PublishAot=true -p:Version=${{ steps.version.outputs.VERSION }}

      # Windows runner 默认无 Unix 版 zip 命令，改用 PowerShell 原生 Compress-Archive
      - name: Package
        shell: pwsh
        run: |
          $publishDir = "src/SDK_Toolkit/LingFanEngine.SDK.Desktop/bin/Release/net10.0/win-x64/publish"
          $zipPath = "${{ github.workspace }}/LingFanEngine.SDK.Desktop-win-x64.zip"
          if (Test-Path $zipPath) { Remove-Item $zipPath -Force }
          Compress-Archive -Path "$publishDir/*" -DestinationPath $zipPath -Force

      - name: Upload SDK windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdk-windows
          path: LingFanEngine.SDK.Desktop-win-x64.zip

  publish-sdk-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Compute version
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # NativeAOT 在 Linux 需要 clang + zlib 开发头文件
      - name: Install NativeAOT dependencies
        run: sudo apt-get update && sudo apt-get install -y clang zlib1g-dev

      - name: Build engine libs (seed for SyncEngineDlls)
        run: dotnet build src/EngineCore/LingFanEngine/LingFanEngine.csproj -c Release -f net10.0 -p:Version=${{ steps.version.outputs.VERSION }}

      - name: AOT publish SDK.Desktop (linux-x64)
        run: dotnet publish src/SDK_Toolkit/LingFanEngine.SDK.Desktop/LingFanEngine.SDK.Desktop.csproj -c Release -r linux-x64 --self-contained true -p:PublishAot=true -p:Version=${{ steps.version.outputs.VERSION }}

      - name: Package
        shell: bash
        run: |
          cd src/SDK_Toolkit/LingFanEngine.SDK.Desktop/bin/Release/net10.0/linux-x64/publish
          zip -r "${{ github.workspace }}/LingFanEngine.SDK.Desktop-linux-x64.zip" .

      - name: Upload SDK linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdk-linux
          path: LingFanEngine.SDK.Desktop-linux-x64.zip

  publish-sdk-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Compute version
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build engine libs (seed for SyncEngineDlls)
        run: dotnet build src/EngineCore/LingFanEngine/LingFanEngine.csproj -c Release -f net10.0 -p:Version=${{ steps.version.outputs.VERSION }}

      - name: AOT publish SDK.Desktop (osx-arm64)
        run: dotnet publish src/SDK_Toolkit/LingFanEngine.SDK.Desktop/LingFanEngine.SDK.Desktop.csproj -c Release -r osx-arm64 --self-contained true -p:PublishAot=true -p:Version=${{ steps.version.outputs.VERSION }}

      - name: Package
        shell: bash
        run: |
          cd src/SDK_Toolkit/LingFanEngine.SDK.Desktop/bin/Release/net10.0/osx-arm64/publish
          zip -r "${{ github.workspace }}/LingFanEngine.SDK.Desktop-osx-arm64.zip" .

      - name: Upload SDK macos artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdk-macos
          path: LingFanEngine.SDK.Desktop-osx-arm64.zip

  release:
    needs: [publish-engine, publish-sdk-windows, publish-sdk-linux, publish-sdk-macos]
    runs-on: ubuntu-latest
    # 仅 release job 需要写权限创建 Release；其余 job 继承仓库默认 token（含 actions 作用域，
    # 供 upload/download-artifact 正常调 API）。不在 workflow 顶层写 permissions，避免未列出作用域被降级为 none。
    permissions:
      contents: write
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: LingFan Engine Sdk
          files: |
            artifacts/engine-package/LingFanEngine.DLLs.zip
            artifacts/engine-package/updates/latest.json
            artifacts/sdk-windows/LingFanEngine.SDK.Desktop-win-x64.zip
            artifacts/sdk-linux/LingFanEngine.SDK.Desktop-linux-x64.zip
            artifacts/sdk-macos/LingFanEngine.SDK.Desktop-osx-arm64.zip
          generate_release_notes: true
